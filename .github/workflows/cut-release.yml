name: Cut Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      commit_sha:
        description: 'Optional commit SHA to release from (defaults to HEAD of main)'
        required: false
        type: string

jobs:
  cut-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.commit_sha || 'main' }}
          token: ${{ secrets.RELEASE_GITHUB_TOKEN }}

      - name: Capture release commit SHA
        id: release_commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute next version and changelog
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          default_bump: ${{ inputs.bump }}
          tag_prefix: release-
          dry_run: true

      - name: Update render.yaml production branches
        run: |
          BRANCH="${{ steps.version.outputs.new_tag }}"
          python3 - "$BRANCH" <<'EOF'
          import sys, re

          branch = sys.argv[1]
          with open("render.yaml") as f:
              content = f.read()

          def update_production_branches(text, new_branch):
              lines = text.splitlines(keepends=True)
              result = []
              i = 0
              while i < len(lines):
                  line = lines[i]
                  if re.match(r'  - type:', line):
                      block = [line]
                      j = i + 1
                      while j < len(lines) and not re.match(r'  - type:|^databases:', lines[j]):
                          block.append(lines[j])
                          j += 1
                      block_text = "".join(block)
                      if "domains:" in block_text:
                          block_text = re.sub(
                              r'(^\s+branch:\s+).+',
                              r'\g<1>' + new_branch,
                              block_text,
                              flags=re.MULTILINE,
                          )
                      result.append(block_text)
                      i = j
                  else:
                      result.append(line)
                      i += 1
              return "".join(result)

          updated = update_production_branches(content, branch)
          with open("render.yaml", "w") as f:
              f.write(updated)

          print(updated)
          EOF

      - name: Commit render.yaml update to release branch and open PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.version.outputs.new_tag }}"
          if git ls-remote --exit-code --heads origin "$BRANCH"; then
            echo "Error: branch $BRANCH already exists"
            exit 1
          fi
          git checkout -b "$BRANCH"
          VERSION="${{ steps.version.outputs.new_version }}"
          git add render.yaml
          if git diff --cached --quiet; then
            echo "No changes to render.yaml — production branch already set correctly"
          else
            git commit -m "chore: point production deployment to $BRANCH"
          fi
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: point production deployment to $BRANCH" \
            --body "Automated PR to update render.yaml production branches to \`$BRANCH\`." \
            --base main \
            --head "$BRANCH"
          gh release create "$BRANCH" \
            --title "v${VERSION}" \
            --target "$BRANCH" \
            --notes '${{ steps.version.outputs.changelog }}'

      - name: Assign linked issues to release milestone
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          script: |
            const { execSync } = require("child_process");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const version = "${{ steps.version.outputs.new_version }}";
            const newTag = "${{ steps.version.outputs.new_tag }}";
            const previousTag = "${{ steps.version.outputs.previous_tag }}";
            const releaseSha = "${{ steps.release_commit.outputs.sha }}";
            const milestoneTitle = `v${version}`;

            function extractIssueRefs(text) {
              const refs = new Set();
              for (const match of (text || "").matchAll(/(?:^|[\s(])#(\d+)\b/gm)) {
                refs.add(Number(match[1]));
              }
              return refs;
            }

            async function releaseDueOn() {
              try {
                const { data: release } = await github.rest.repos.getReleaseByTag({
                  owner,
                  repo,
                  tag: newTag,
                });
                if (release.published_at) {
                  return new Date(release.published_at).toISOString();
                }
              } catch (error) {
                core.warning(
                  `Could not read release ${newTag} for due date: ${error.message}`,
                );
              }
              const commitDate = execSync(
                `git log -1 --format=%cI ${releaseSha}`,
                { encoding: "utf8" },
              ).trim();
              return new Date(commitDate).toISOString();
            }

            // Collect PRs included in this release (merge commits AND squash commits).
            const prNumbers = new Set();
            const logRange = previousTag
              ? `refs/tags/${previousTag}..${releaseSha}`
              : releaseSha;
            let commitSubjects = "";
            try {
              commitSubjects = execSync(
                `git log ${logRange} --pretty=format:%s`,
                { encoding: "utf8" },
              );
            } catch (error) {
              core.warning(`git log failed for range ${logRange}: ${error.message}`);
            }
            for (const line of commitSubjects.split("\n")) {
              const mergeMatch = line.match(/Merge pull request #(\d+)/);
              if (mergeMatch) { prNumbers.add(Number(mergeMatch[1])); continue; }
              const squashMatch = line.match(/\(#(\d+)\)\s*$/);
              if (squashMatch) prNumbers.add(Number(squashMatch[1]));
            }
            core.info(`Found ${prNumbers.size} PR(s) in release range`);

            const issueRefs = new Set();
            for (const prNumber of prNumbers) {
              let pr;
              try {
                const resp = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: prNumber,
                });
                pr = resp.data;
              } catch (error) {
                if (error.status === 404) {
                  core.info(`#${prNumber} is not a PR — skipping`);
                  continue;
                }
                throw error;
              }
              const text = `${pr.title || ""}\n${pr.body || ""}`;
              for (const num of extractIssueRefs(text)) {
                issueRefs.add(num);
              }
            }
            core.info(
              `Found ${issueRefs.size} linked issue(s): ${[...issueRefs].join(", ") || "none"}`,
            );
            if (issueRefs.size === 0) return;

            const dueOn = await releaseDueOn();
            core.info(`Milestone due date: ${dueOn}`);

            let milestone = null;
            for await (const response of github.paginate.iterator(
              github.rest.issues.listMilestones,
              { owner, repo, state: "all", per_page: 100 },
            )) {
              milestone = response.data.find((m) => m.title === milestoneTitle);
              if (milestone) break;
            }

            if (!milestone) {
              const { data: created } = await github.rest.issues.createMilestone({
                owner,
                repo,
                title: milestoneTitle,
                description: `Shipped in ${newTag}`,
                state: "open",
                due_on: dueOn,
              });
              milestone = created;
              core.info(
                `Created milestone "${milestoneTitle}" (#${milestone.number}, due ${dueOn})`,
              );
            } else {
              const { data: updated } = await github.rest.issues.updateMilestone({
                owner,
                repo,
                milestone_number: milestone.number,
                due_on: dueOn,
              });
              milestone = updated;
              core.info(
                `Using milestone "${milestoneTitle}" (#${milestone.number}, due ${dueOn})`,
              );
            }

            for (const issueNumber of issueRefs) {
              try {
                await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
              } catch (error) {
                if (error.status === 404) {
                  core.warning(`Issue #${issueNumber} not found — skipping`);
                  continue;
                }
                throw error;
              }

              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issueNumber,
                milestone: milestone.number,
              });
              core.info(`Set milestone "${milestoneTitle}" on issue #${issueNumber}`);
            }
