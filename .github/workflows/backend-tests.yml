name: Backend Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'nt-be/**'
      - '.github/workflows/backend-tests.yml'
      - 'justfile'
      - 'render.yaml'
      - '.env.example'
  pull_request:
    branches: [ main ]
    paths:
      - 'nt-be/**'
      - '.github/workflows/backend-tests.yml'
      - 'justfile'
      - 'render.yaml'
      - '.env.example'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        df -h

    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: nt-be
        cache-on-failure: true

    - name: Check formatting
      working-directory: nt-be
      run: cargo fmt -- --check

    - name: Start PostgreSQL with Docker Compose
      working-directory: nt-be
      run: |
        docker compose up -d postgres_test
        sleep 5

    - name: Create .env file
      working-directory: nt-be
      # Fork PRs get no secrets, so both keys are empty here. Two different
      # reasons that's fine:
      #  - FASTNEAR_API_KEY: FastNear's public endpoints (api.fastnear.com,
      #    transfers.main.fastnear.com) accept an *empty* bearer as anonymous
      #    (only an *invalid* key 401s), so the live-hitting integration tests
      #    still work keyless. The one authed-only check
      #    (parity_across_production_endpoints) is gated off via
      #    FASTNEAR_LIVE_TESTS below.
      #  - INTENTS_EXPLORER_API_KEY: the intents-explorer calls are replayed
      #    from the offline rpc_cache_proxy (keyed by request, not auth), but
      #    swap detection is skipped when the key is empty
      #    (env parsing `.filter(|s| !s.is_empty())`), so fall back to a dummy
      #    non-empty value to exercise that path against the fixtures.
      run: |
        cat > .env << EOF
        DATABASE_URL=postgres://treasury_test:test_password@localhost:5433/treasury_test_db
        PORT=3000
        FASTNEAR_API_KEY=${{ secrets.FASTNEAR_API_KEY }}
        INTENTS_EXPLORER_API_KEY=${{ secrets.INTENTS_EXPLORER_API_KEY || 'ci-fixture-key' }}
        JWT_SECRET=test-jwt-secret-for-ci-testing
        EOF

    - name: Cache sqlx-cli
      id: cache-sqlx
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/sqlx
        key: ${{ runner.os }}-sqlx-0.8

    - name: Install sqlx-cli
      if: steps.cache-sqlx.outputs.cache-hit != 'true'
      run: cargo install sqlx-cli --no-default-features --features postgres

    - name: Run migrations
      working-directory: nt-be
      run: sqlx migrate run

    - name: Run clippy
      working-directory: nt-be
      run: cargo clippy -- -D warnings

    - name: Extract RPC cache fixtures
      working-directory: nt-be
      run: |
        zstd -d tests/fixtures/rpc_cache.tar.zst -o tests/fixtures/rpc_cache.tar
        tar -xf tests/fixtures/rpc_cache.tar -C tests/fixtures/
        echo "Extracted $(ls tests/fixtures/rpc_cache/*.json | wc -l) cached RPC responses"

    - name: Start RPC cache proxy
      working-directory: nt-be
      run: |
        cargo build --bin rpc_cache_proxy
        CACHE_DIR=tests/fixtures/rpc_cache PORT=18552 \
          cargo run --bin rpc_cache_proxy 2>/tmp/rpc_proxy.log &
        # Wait for proxy to be ready
        for i in $(seq 1 30); do
          if curl -s http://127.0.0.1:18552/near-rpc/ > /dev/null 2>&1; then
            echo "RPC cache proxy ready"
            break
          fi
          sleep 0.5
        done

    - name: Run unit tests
      working-directory: nt-be
      env:
        NEAR_RPC_URL: http://127.0.0.1:18552/near-rpc
        NEAR_ARCHIVAL_RPC_URL: http://127.0.0.1:18552/near-archival
        TRANSFER_HINTS_BASE_URL: http://127.0.0.1:18552/fastnear-hints
        NEARDATA_BASE_URL: http://127.0.0.1:18552/neardata
        INTENTS_EXPLORER_API_URL: http://127.0.0.1:18552/intents-explorer/api/v0
        # `enabled` only when the real FastNear secret is present (internal
        # PRs / main). On fork PRs the secret is empty -> `disabled`, so the
        # live-endpoint parity canary skips instead of failing on a dummy key.
        FASTNEAR_LIVE_TESTS: ${{ secrets.FASTNEAR_API_KEY != '' && 'enabled' || 'disabled' }}
      run: cargo test --lib --bins

    - name: Build binary for integration tests
      working-directory: nt-be
      run: cargo build

    - name: Run integration tests
      working-directory: nt-be
      env:
        NEAR_RPC_URL: http://127.0.0.1:18552/near-rpc
        NEAR_ARCHIVAL_RPC_URL: http://127.0.0.1:18552/near-archival
        TRANSFER_HINTS_BASE_URL: http://127.0.0.1:18552/fastnear-hints
        NEARDATA_BASE_URL: http://127.0.0.1:18552/neardata
        INTENTS_EXPLORER_API_URL: http://127.0.0.1:18552/intents-explorer/api/v0
        # `enabled` only when the real FastNear secret is present (internal
        # PRs / main). On fork PRs the secret is empty -> `disabled`, so the
        # live-endpoint parity canary skips instead of failing on a dummy key.
        FASTNEAR_LIVE_TESTS: ${{ secrets.FASTNEAR_API_KEY != '' && 'enabled' || 'disabled' }}
      run: cargo test --tests

    - name: Show RPC proxy logs
      if: always()
      run: cat /tmp/rpc_proxy.log 2>/dev/null || echo "No proxy logs"

    - name: Stop PostgreSQL
      if: always()
      working-directory: nt-be
      run: docker compose down
