name: Bulk Payment - E2E Test

on:
  push:
    branches: [main]
    paths:
      - 'sandbox/**'
      - 'contracts/bulk-payment/**'
      - 'e2e-tests/bulk-payment/**'
      - 'nt-be/**'
      - '.github/workflows/bulk-payment-e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - 'sandbox/**'
      - 'contracts/bulk-payment/**'
      - 'e2e-tests/bulk-payment/**'
      - 'nt-be/**'
      - '.github/workflows/bulk-payment-e2e.yml'
  workflow_dispatch:

jobs:

  e2e-test:
    name: Run E2E Tests
    # The sandbox image is built locally in-runner (below) and never pushed
    # to a registry — E2E doesn't need a durable image — so this runs for
    # every event, including fork PRs (which have no registry write access).
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install test dependencies
        working-directory: ./e2e-tests/bulk-payment
        run: npm install

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build sandbox image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./sandbox/Dockerfile
          platforms: linux/amd64
          # Load into the local docker daemon — no registry push, so no
          # write token / secrets are needed. `load` only supports a single
          # platform, which is all the E2E runner needs.
          load: true
          push: false
          tags: near-treasury-sandbox
          # Shared, named gha cache scope so the expensive `cargo build
          # --release` layers are reused across runs AND across the other
          # workflow that builds this same image (frontend-e2e) — no
          # per-workflow recompilation.
          cache-from: type=gha,scope=near-treasury-sandbox
          cache-to: type=gha,scope=near-treasury-sandbox,mode=max

      - name: Start Docker container
        run: |
          docker run -d \
            --name sandbox \
            -p 3030:3030 \
            -p 8080:8080 \
            -p 5001:5001 \
            -p 5432:5432 \
            near-treasury-sandbox

          echo "Waiting for services to start..."
          sleep 30

          for i in {1..30}; do
            if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
              echo "API is ready!"
              break
            fi
            echo "Waiting for API... ($i/30)"
            sleep 5
          done

          docker logs sandbox

      - name: Run E2E tests
        working-directory: ./e2e-tests/bulk-payment
        env:
          SANDBOX_RPC_URL: http://localhost:3030
          API_URL: http://localhost:8080
          NUM_RECIPIENTS: '25'
        run: npm test

      - name: Show Docker logs on failure
        if: failure()
        run: docker logs sandbox

      - name: Stop Docker container
        if: always()
        run: |
          docker stop sandbox || true
          docker rm sandbox || true
